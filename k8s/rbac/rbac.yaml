apiVersion: v1
kind: ServiceAccount
metadata:
  name: atlas-sa
  namespace: atlas-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: atlas-sa
  namespace: atlas-core
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: atlas-sa
  namespace: atlas-gateway
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: atlas-role
  namespace: atlas-system
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: atlas-role
  namespace: atlas-core
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: atlas-role
  namespace: atlas-gateway
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: atlas-rolebinding
  namespace: atlas-system
subjects:
- kind: ServiceAccount
  name: atlas-sa
  namespace: atlas-system
roleRef:
  kind: Role
  name: atlas-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: atlas-rolebinding
  namespace: atlas-core
subjects:
- kind: ServiceAccount
  name: atlas-sa
  namespace: atlas-core
roleRef:
  kind: Role
  name: atlas-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: atlas-rolebinding
  namespace: atlas-gateway
subjects:
- kind: ServiceAccount
  name: atlas-sa
  namespace: atlas-gateway
roleRef:
  kind: Role
  name: atlas-role
  apiGroup: rbac.authorization.k8s.io
